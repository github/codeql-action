# Instead, please modify the template in the pr-checks directory and run:
#     pr-checks/sync.sh
# to regenerate this file.

name: PR Check - Extractor ram and threads options test
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GO111MODULE: auto
on:
  push:
    branches:
      - main
      - releases/v*
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
    types:
      - checks_requested
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs: {}
  workflow_call:
    inputs: {}
defaults:
  run:
    shell: bash
concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' || false }}
  group: extractor-ram-threads-${{github.ref}}
jobs:
  should-run-extractor-ram-threads:
    name: Decide whether to run this check
    timeout-minutes: 10
    runs-on: ubuntu-slim
    if: github.triggering_actor != 'dependabot[bot]'
    outputs:
      run-check: ${{ steps.changed-files-check.outputs.run-check || steps.event-type-check.outputs.run-check }}
    steps:
      - name: Run check if this is not a PR
        id: event-type-check
        if: github.event_name != 'pull_request'
        run: echo "run-check=true" >> "$GITHUB_OUTPUT"
      - name: Check out repository
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
      - name: Determine changed files
        id: changed-files
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/changed-files
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          exclude: '["README.md"]'
      - name: Run check because of changed files
        id: changed-files-check
        if: github.event_name != 'pull_request' && steps.changed-files.outputs.files != '[]'
        run: echo "run-check=true" >> "$GITHUB_OUTPUT"
  extractor-ram-threads:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            version: linked
    name: Extractor ram and threads options test
    needs:
      - should-run-extractor-ram-threads
    if: needs.should-run-extractor-ram-threads.outputs.run-check == 'true'
    permissions:
      contents: read
      security-events: read
    timeout-minutes: 45
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Prepare test
        id: prepare-test
        uses: ./.github/actions/prepare-test
        with:
          version: ${{ matrix.version }}
          use-all-platform-bundle: 'false'
          setup-kotlin: 'true'
      - uses: ./../action/init
        with:
          languages: java
          ram: 230
          threads: 1
      - name: Assert Results
        run: |
          if [ "${CODEQL_RAM}" != "230" ]; then
            echo "CODEQL_RAM is '${CODEQL_RAM}' instead of 230"
            exit 1
          fi
          if [ "${CODEQL_EXTRACTOR_JAVA_RAM}" != "230" ]; then
            echo "CODEQL_EXTRACTOR_JAVA_RAM is '${CODEQL_EXTRACTOR_JAVA_RAM}' instead of 230"
            exit 1
          fi
          if [ "${CODEQL_THREADS}" != "1" ]; then
            echo "CODEQL_THREADS is '${CODEQL_THREADS}' instead of 1"
            exit 1
          fi
          if [ "${CODEQL_EXTRACTOR_JAVA_THREADS}" != "1" ]; then
            echo "CODEQL_EXTRACTOR_JAVA_THREADS is '${CODEQL_EXTRACTOR_JAVA_THREADS}' instead of 1"
            exit 1
          fi
    env:
      CODEQL_ACTION_TEST_MODE: true
  skip-extractor-ram-threads:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            version: linked
    name: Extractor ram and threads options test
    needs:
      - should-run-extractor-ram-threads
    if: needs.should-run-extractor-ram-threads.outputs.run-check != 'true'
    timeout-minutes: 5
    runs-on: ubuntu-slim
    steps:
      - name: Success
        run: exit 0
