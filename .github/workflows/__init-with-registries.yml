# Instead, please modify the template in the pr-checks directory and run:
#     pr-checks/sync.sh
# to regenerate this file.

name: 'PR Check - Packaging: Download using registries'
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GO111MODULE: auto
on:
  push:
    branches:
      - main
      - releases/v*
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
    types:
      - checks_requested
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs: {}
  workflow_call:
    inputs: {}
defaults:
  run:
    shell: bash
concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' || false }}
  group: init-with-registries-${{github.ref}}
jobs:
  should-run-init-with-registries:
    name: Decide whether to run this check
    timeout-minutes: 10
    runs-on: ubuntu-slim
    if: github.triggering_actor != 'dependabot[bot]'
    outputs:
      run-check: ${{ steps.changed-files-check.outputs.run-check || steps.event-type-check.outputs.run-check }}
    steps:
      - name: Run check if this is not a PR
        id: event-type-check
        if: github.event_name != 'pull_request'
        run: echo "run-check=true" >> "$GITHUB_OUTPUT"
      - name: Check out repository
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
      - name: Determine changed files
        id: changed-files
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/changed-files
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          exclude: '["README.md"]'
      - name: Run check because of changed files
        id: changed-files-check
        if: github.event_name != 'pull_request' && steps.changed-files.outputs.files != '[]'
        run: echo "run-check=true" >> "$GITHUB_OUTPUT"
  init-with-registries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            version: default
          - os: ubuntu-latest
            version: linked
          - os: ubuntu-latest
            version: nightly-latest
    name: 'Packaging: Download using registries'
    needs:
      - should-run-init-with-registries
    if: needs.should-run-init-with-registries.outputs.run-check == 'true'
    permissions:
      contents: read
      packages: read
    timeout-minutes: 45
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Prepare test
        id: prepare-test
        uses: ./.github/actions/prepare-test
        with:
          version: ${{ matrix.version }}
          use-all-platform-bundle: 'false'
          setup-kotlin: 'true'
      - name: Init with registries
        uses: ./../action/init
        with:
          db-location: '${{ runner.temp }}/customDbLocation'
          tools: ${{ steps.prepare-test.outputs.tools-url }}
          config-file: ./.github/codeql/codeql-config-registries.yml
          languages: javascript
          registries: |
            - url: "https://ghcr.io/v2/"
              packages: "*/*"
              token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Verify packages installed
        run: |
          PRIVATE_PACK="$HOME/.codeql/packages/codeql-testing/private-pack"
          CODEQL_PACK1="$HOME/.codeql/packages/codeql-testing/codeql-pack1"

          if [[ -d $PRIVATE_PACK ]]
          then
              echo "$PRIVATE_PACK was installed."
          else
              echo "::error $PRIVATE_PACK pack was not installed."
              exit 1
          fi

          if [[ -d $CODEQL_PACK1 ]]
          then
              echo "$CODEQL_PACK1 was installed."
          else
              echo "::error $CODEQL_PACK1 pack was not installed."
              exit 1
          fi

      - name: Verify qlconfig.yml file was created
        run: |
          QLCONFIG_PATH=$RUNNER_TEMP/qlconfig.yml
          echo "Expected qlconfig.yml file to be created at $QLCONFIG_PATH"
          if [[ -f $QLCONFIG_PATH ]]
          then
              echo "qlconfig.yml file was created."
          else
              echo "::error qlconfig.yml file was not created."
              exit 1
          fi

      - name: Verify contents of qlconfig.yml
        run: |
          QLCONFIG_PATH=$RUNNER_TEMP/qlconfig.yml
          cat $QLCONFIG_PATH | yq -e '.registries[] | select(.url == "https://ghcr.io/v2/") | select(.packages == "*/*")'
          if [[ $? -eq 0 ]]
          then
              echo "Registry was added to qlconfig.yml file."
          else
              echo "::error Registry was not added to qlconfig.yml file."
              echo "Contents of qlconfig.yml file:"
              cat $QLCONFIG_PATH
              exit 1
          fi
    env:
      CODEQL_ACTION_TEST_MODE: true
  skip-init-with-registries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            version: default
          - os: ubuntu-latest
            version: linked
          - os: ubuntu-latest
            version: nightly-latest
    name: 'Packaging: Download using registries'
    needs:
      - should-run-init-with-registries
    if: needs.should-run-init-with-registries.outputs.run-check != 'true'
    timeout-minutes: 5
    runs-on: ubuntu-slim
    steps:
      - name: Success
        run: exit 0
